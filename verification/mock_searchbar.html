<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchBar Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a0a2e;
            color: #f3f0ff;
            font-family: sans-serif;
            padding: 50px;
        }
        .input {
            width: 100%;
            border-radius: 0.75rem;
            border-width: 1px;
            padding-left: 1rem;
            padding-right: 1rem;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            color: white;
            outline: 2px solid transparent;
            outline-offset: 2px;
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
            background-color: rgba(45, 18, 69, 0.7);
            border-color: rgba(255, 214, 98, 0.2);
        }
        .pl-11 { padding-left: 2.75rem; }
        .pr-20 { padding-right: 5rem; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto space-y-8">
        <div>
            <h2 class="text-xl mb-4">Search Bar (Empty)</h2>
            <div class="relative w-full">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <!-- Search Icon Mock -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/30"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input
                    type="text"
                    role="searchbox"
                    aria-label="Qidirish"
                    class="input pl-11 pr-20"
                    placeholder="F.I.Sh bo'yicha qidirish"
                />
                <div class="absolute inset-y-0 right-0 flex items-center pr-2 gap-2">
                    <kbd class="hidden sm:inline-flex h-6 select-none items-center gap-1 rounded border border-white/10 bg-white/5 px-1.5 font-mono text-[10px] font-medium text-white/40 opacity-100">
                        <span class="text-xs">⌘</span>K
                    </kbd>
                </div>
            </div>
        </div>

        <div>
            <h2 class="text-xl mb-4">Search Bar (With Text)</h2>
            <div class="relative w-full">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/30"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input
                    type="text"
                    role="searchbox"
                    aria-label="Qidirish"
                    class="input pl-11 pr-20"
                    value="John Doe"
                />
                <div class="absolute inset-y-0 right-0 flex items-center pr-2 gap-2">
                    <button class="p-1 hover:bg-white/10 rounded-md text-white/50 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <kbd class="hidden sm:inline-flex h-6 select-none items-center gap-1 rounded border border-white/10 bg-white/5 px-1.5 font-mono text-[10px] font-medium text-white/40 opacity-100">
                        <span class="text-xs">⌘</span>K
                    </kbd>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
